# GL.iNet nginx location — NetBird UI at http://192.168.8.1/netbird/
# Deploy to: /etc/nginx/gl-conf.d/netbird.conf

location = /netbird {
    return 302 /netbird/;
}

# Static SPA served directly by nginx — no CGI overhead
location = /netbird/ {
    root /www;
    try_files /netbird/index.html =404;
    add_header Cache-Control "no-cache, no-store";
}

# JSON API — proxied to shell CGI via uhttpd (prefix match, not exact)
location /netbird/api {
    proxy_pass         http://127.0.0.1:8080/cgi-bin/netbird-api;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 60;
    proxy_pass_header  Content-Type;
}
